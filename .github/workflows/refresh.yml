name: Refresh defence DB

on:
  schedule:
    # 19:00 UTC = 00:30 IST next day — after NSE close.
    - cron: "0 19 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap if first run
        run: |
          if [ ! -f data/defence.db ]; then python scripts/bootstrap.py; fi

      - name: Refresh live market data
        run: python scripts/refresh.py

      - name: Commit updated DB + export
        run: |
          git config user.name  "defence-db-bot"
          git config user.email "defence-db-bot@users.noreply.github.com"
          git add -f data/defence.db data/exports/*.xlsx || true
          git commit -m "chore(refresh): nightly market data update" || echo "nothing to commit"
          git push || echo "nothing to push"
